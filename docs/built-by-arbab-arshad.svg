<svg width="1200" height="220" viewBox="0 0 1200 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Built and developed by Arbab Arshad</title>
  <desc id="desc">Animated developer credit banner with neon grid and moving highlight.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#07111f" />
      <stop offset="45%" stop-color="#0a2230" />
      <stop offset="100%" stop-color="#081018" />
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#21d4fd" />
      <stop offset="50%" stop-color="#3ecf8e" />
      <stop offset="100%" stop-color="#21d4fd" />
      <animate attributeName="x1" values="-300;1200" dur="5s" repeatCount="indefinite" />
      <animate attributeName="x2" values="900;2400" dur="5s" repeatCount="indefinite" />
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#3ecf8e" stop-opacity="0.45" />
      <stop offset="55%" stop-color="#21d4fd" stop-opacity="0.12" />
      <stop offset="100%" stop-color="#21d4fd" stop-opacity="0" />
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 H 0 V 48" stroke="#21d4fd" stroke-opacity="0.08" stroke-width="1" />
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.5" />
    </filter>
  </defs>

  <rect width="1200" height="220" rx="28" fill="url(#bg)" />
  <rect width="1200" height="220" rx="28" fill="url(#grid)" />
  <circle cx="220" cy="110" r="120" fill="url(#glow)">
    <animate attributeName="cx" values="180;1020;180" dur="8s" repeatCount="indefinite" />
  </circle>
  <circle cx="980" cy="110" r="90" fill="#3ecf8e" fill-opacity="0.08">
    <animate attributeName="r" values="80;110;80" dur="4s" repeatCount="indefinite" />
  </circle>

  <path d="M70 164H1130" stroke="url(#accent)" stroke-width="2" stroke-linecap="round" opacity="0.8" />
  <path d="M70 166H1130" stroke="#21d4fd" stroke-opacity="0.08" stroke-width="10" stroke-linecap="round" />

  <g filter="url(#shadow)">
    <text x="600" y="92" text-anchor="middle" fill="#f3f7fb" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="700" letter-spacing="3">
      BUILT AND DEVELOPED BY
    </text>
    <text x="600" y="145" text-anchor="middle" fill="url(#accent)" font-family="Inter, Arial, sans-serif" font-size="56" font-weight="900" letter-spacing="1.5">
      ARBAB ARSHAD
    </text>
  </g>

  <g opacity="0.95">
    <rect x="74" y="40" width="96" height="28" rx="14" fill="#0f1d2d" stroke="#21d4fd" stroke-opacity="0.35" />
    <text x="122" y="59" text-anchor="middle" fill="#21d4fd" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">
      CREDIT
    </text>
  </g>

  <g opacity="0.9">
    <rect x="1030" y="40" width="98" height="28" rx="14" fill="#0f1d2d" stroke="#3ecf8e" stroke-opacity="0.35" />
    <text x="1079" y="59" text-anchor="middle" fill="#3ecf8e" font-family="Inter, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="2">
      NULLCHANNEL
    </text>
  </g>
</svg>
